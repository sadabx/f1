<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>F1 Live Dashboard | Formula 1 Race Schedule & Standings</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="A live Formula 1 season dashboard featuring countdowns, real-time race schedules, live standings, and qualifying results." />
    <meta name="keywords" content="F1, Formula 1, Live Dashboard, Race Calendar, Standings, Results, Motorsport" />
    <meta name="author" content="TRIONINE" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="F1 Live Dashboard | Formula 1 Race Schedule & Standings" />
    <meta property="og:description" content="A live Formula 1 season dashboard featuring countdowns, real-time race schedules, live standings, and qualifying results." />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="F1 Live Dashboard | Formula 1 Race Schedule & Standings" />
    <meta name="twitter:description" content="A live Formula 1 season dashboard featuring countdowns, real-time race schedules, live standings, and qualifying results." />

    <link rel="icon" type="image/png" href="f1car.png">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="top-bar">
      <h1>
        <span class="f1-badge" onclick="if(window.innerWidth <= 650) toggleRel();" title="Toggle Relative Time">F1</span>
        <span id="year-display">Live</span> Season Dashboard
      </h1>
      <nav class="controls" aria-label="Dashboard Controls">
        <div class="pill" id="btn-past" onclick="togglePast()" role="button" tabindex="0">
          Show past races
        </div>
        <div class="pill" id="btn-rel" onclick="toggleRel()" role="button" tabindex="0">Relative time</div>
      </nav>
    </header>

    <section class="countdown" id="countdown" aria-label="Next Race Countdown">
      <div>
        <div class="cd-label">Next race</div>
        <div class="cd-race" id="cd-name">—</div>
      </div>
      <div style="text-align: right">
        <div class="cd-label">Countdown</div>
        <div class="cd-timer" id="cd-timer">—</div>
      </div>
    </section>

    <main class="layout" id="main-layout">
      
      <div id="title-container" class="desktop-only">
        <div class="section-label">Race Calendar</div>
      </div>

      <div id="next-race-container">
        <div id="next-race-content"><div class="spinner">Fetching...</div></div>
      </div>

      <div id="upcoming-container">
        <div class="mobile-header desktop-hidden" onclick="toggleSection('upcoming')">
          Upcoming Races <span id="chev-upcoming" class="chev open">▼</span>
        </div>
        <div id="upcoming-content" class="section-list open"></div>
      </div>

      <div class="right-col">
        <div class="panel">
          <div class="tabs">
            <div class="tab" id="t-grd" onclick="switchTab('grd')" style="display: none;">
              Grid
            </div>
            <div class="tab on" id="t-std" onclick="switchTab('std')">
              Standings
            </div>
            <div class="tab" id="t-res" onclick="switchTab('res')">
              Results
            </div>
          </div>
          
          <div class="tc" id="tc-grd"><div class="spinner">Waiting for Qualifying…</div></div>
          <div class="tc on" id="tc-std"><div class="spinner">Loading…</div></div>
          <div class="tc" id="tc-res"><div class="spinner">Loading…</div></div>
        </div>

        <div class="panel">
          <div class="panel-head">Season at a glance</div>
          <div class="stat-grid">
            <div class="stat">
              <div class="stat-label">Races done</div>
              <div class="stat-val" id="s-done">—</div>
            </div>
            <div class="stat">
              <div class="stat-label">Races left</div>
              <div class="stat-val" id="s-left">—</div>
            </div>
            <div class="stat">
              <div class="stat-label">Leader</div>
              <div class="stat-val sm" id="s-leader">—</div>
              <div class="stat-sub" id="s-leader-pts"></div>
            </div>
            <div class="stat">
              <div class="stat-label">Next up</div>
              <div class="stat-val sm" id="s-next">—</div>
              <div class="stat-sub" id="s-next-r"></div>
            </div>
          </div>
        </div>
      </div>

      <section id="past-container" aria-label="Past Races">
        <div class="section-label desktop-only">Past Races</div>
        <div class="mobile-header desktop-hidden" onclick="toggleSection('past')">
          Past Races <span id="chev-past" class="chev">▼</span>
        </div>
        <div id="past-content" class="section-list"></div>
      </section>
    </main>

    <footer class="footer">
      Developed by <a href="https://trionine.xyz" target="_blank" rel="noopener noreferrer">TRIONINE</a>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
